<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            background-color: #333;
            padding: 10px;
        }

        .navbar a {
            background-color: #555;
            color: white;
            padding: 10px 15px;
            margin: 5px;
            text-decoration: none;
            border-radius: 5px;
        }

        .navbar a:hover {
            background-color: #ff9800;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        .skill-box {
            margin: 20px 0;
            text-align: left;
        }

        .skill-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .progress {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 20px;
            background: #ff9800;
            text-align: right;
            padding-right: 5px;
            color: white;
            line-height: 20px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('qualification') }}">Qualification</a>
    <a href="{{ url_for('skills') }}">Skills</a>
    <a href="{{ url_for('projects') }}">Projects</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</div>

<div class="container">

    <h1>My Skills</h1>

    <!-- Programming -->
    <div class="skill-box">
        <div class="skill-name">C Programming</div>
        <div class="progress">
            <div class="progress-bar" style="width: 80%;">80%</div>
        </div>
    </div>

    <div class="skill-box">
        <div class="skill-name">Python</div>
        <div class="progress">
            <div class="progress-bar" style="width: 75%;">75%</div>
        </div>
    </div>

    <div class="skill-box">
        <div class="skill-name">HTML & CSS</div>
        <div class="progress">
            <div class="progress-bar" style="width: 85%;">85%</div>
        </div>
    </div>

    <!-- Tools -->
    <div class="skill-box">
        <div class="skill-name">MySQL
        <div class="progress">
            <div class="progress-bar" style="width: 70%;">70%</div>
        </div>
    </div>

    <div class="skill-box">
        <div class="skill-name">Git & GitHub</div>
        <div class="progress">
            <div class="progress-bar" style="width: 65%;">65%</div>
        </div>
    </div>
         <div class="skill-box">
        <div class="skill-name">AI & ML</div>
        <div class="progress">
            <div class="progress-bar" style="width: 40%;">40%</div>
        </div>
    </div>


    <div class="skill-box">
        <div class="skill-name">Data Science</div>
        <div class="progress">
            <div class="progress-bar" style="width: 60%;">60%</div>
        </div>
    </div>

</div>

</body>
</html>
